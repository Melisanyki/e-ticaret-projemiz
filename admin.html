<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MB Flora | Yönetim Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; display: flex; background: #f4f4f4; }
        
        /* Yan Menü (Sidebar) */
        .sidebar { width: 250px; height: 100vh; background: #333; color: white; padding: 20px; position: fixed; }
        .sidebar h2 { color: #d63384; font-size: 20px; text-align: center; }
        .sidebar ul { list-style: none; padding: 0; margin-top: 30px; }
        .sidebar ul li { padding: 15px; border-bottom: 1px solid #444; cursor: pointer; transition: 0.3s; }
        .sidebar ul li:hover { background: #d63384; }

        /* Ana İçerik Alanı */
        .main-content { margin-left: 250px; padding: 40px; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* Tablo Tasarımı */
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 10px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #d63384; color: white; }
        
        .status-badge { padding: 5px 10px; border-radius: 15px; font-size: 12px; font-weight: 600; }
        .status-preparing { background: #fff3cd; color: #856404; }
        .status-shipped { background: #d1ecf1; color: #0c5460; }

        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .btn-add { background: #d63384; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>MB Flora Admin</h2>
    <ul>
        <li>📊 Dashboard</li>
        <li onclick="showSection('products')">🌸 Ürün Yönetimi</li>
        <li onclick="showSection('orders')">📦 Siparişler</li>
        <li onclick="window.location.href='urunler.html'">🌐 Siteye Git</li>
    </ul>
</div>

<div class="main-content">
    <div class="header">
        <h1 id="page-title">Sipariş Yönetimi</h1>
        <button class="btn-add">+ Yeni Ürün Ekle</button>
    </div>

    <table id="orders-table">
        <thead>
            <tr>
                <th>Sipariş No</th>
                <th>Müşteri</th>
                <th>Ürün</th>
                <th>Tutar</th>
                <th>Durum</th>
                <th>İşlem</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>#1024</td>
                <td>Ahmet Yılmaz</td>
                <td>Pembe Güller</td>
                <td>450 TL</td>
                <td><span class="status-badge status-preparing">Hazırlanıyor</span></td>
                <td><button onclick="alert('Durum Güncellendi')">Güncelle</button></td>
            </tr>
            <tr>
                <td>#1025</td>
                <td>Ayşe Demir</td>
                <td>Beyaz Asalet</td>
                <td>650 TL</td>
                <td><span class="status-badge status-shipped">Kargoda</span></td>
                <td><button onclick="alert('Durum Güncellendi')">Güncelle</button></td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    function showSection(section) {
        const title = document.getElementById('page-title');
        if(section === 'products') {
            title.innerText = "Ürün Listesi";
            // Burada ürünler tablosunu gösterebiliriz (simülasyon)
        } else {
            title.innerText = "Sipariş Yönetimi";
        }
    }
</script>

</body>
</html>
