<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MB Flora | Güvenilir Katalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
    </style>
</head>
<body>

<nav>
    <div class="logo">
        <a href="urunler.html">MB Flora 🌸</a>
    </div>
    <div class="nav-links">
        <div id="cart-btn" onclick="toggleCart()">Sepetim (0)</div>
    </div>
</nav>

<div class="hero-section">
    <div class="hero-section">
    <h1>Size Özel Çiçekler</h1>
    <p>Duygularınızı en taze haliyle ulaştırıyoruz.</p>
    
    <div class="search-wrapper">
        <input type="text" id="product-search" placeholder="Hangi çiçeği aramıştınız?" onkeyup="searchProducts()">
    </div>
</div>
</div>

<div class="categories">
    <button class="cat-btn active" onclick="filterData('all', this)">Tümü</button>
    <button class="cat-btn" onclick="filterData('gul', this)">Güller</button>
    <button class="cat-btn" onclick="filterData('orkide', this)">Orkideler</button>
    <button class="cat-btn" onclick="filterData('lale', this)">Laleler</button>
</div>

<div class="product-grid">
    <div class="product-card gul">
        <div class="img-container">
            <img src="img/rose1.jpg" class="product-img">
        </div>
        <div class="product-info">
            <small>GÜLLER</small>
            <h3>Pembe Güller</h3>
            <div class="product-price">450 TL</div>
            <button class="add-btn" onclick="buy('Pembe Güller', 450)">SEPETE EKLE</button>
        </div>
    </div>

    <div class="product-card orkide">
        <div class="img-container">
            <img src="img/orchid1.jpg" class="product-img">
        </div>
        <div class="product-info">
            <small>ORKİDELER</small>
            <h3>Beyaz Asalet</h3>
            <div class="product-price">650 TL</div>
            <button class="add-btn" onclick="buy('Beyaz Asalet', 650)">SEPETE EKLE</button>
        </div>
    </div>

    <div class="product-card gul">
        <div class="img-container">
            <img src=img/rose2.jpg class="product-img">
        </div>
        <div class="product-info">
            <small>GÜLLER</small>
            <h3>Pembiş Güller</h3>
            <div class="product-price">280 TL</div>
            <button class="add-btn" onclick="buy('Pembiş Güller', 280)">SEPETE EKLE</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="overlay" onclick="toggleCart()"></div>
<div class="cart-modal" id="cartModal">
    <h2>Sepetiniz 🛒</h2>
    <div class="cart-items-list" id="cartList">
        Sepetiniz şu an boş.
    </div>
    <div id="total-price" style="font-weight: 600; margin-bottom: 15px;">Toplam: 0 TL</div>
    <button class="add-btn">Ödemeye Geç</button>
    <br>
    <button class="close-cart" onclick="toggleCart()">Kapat</button>
</div>

<script>
    function filterData(cat, btn) {
        let currentActive = document.querySelector('.cat-btn.active');
        if(currentActive) currentActive.classList.remove('active');
        btn.classList.add('active');

        let items = document.querySelectorAll('.product-card');
        items.forEach(item => {
            if (cat === 'all') {
                item.classList.remove('hidden');
            } else {
                item.classList.contains(cat) ? item.classList.remove('hidden') : item.classList.add('hidden');
            }
        });
    }

    function searchProducts() {
    let input = document.getElementById('product-search').value.toLowerCase();
    let cards = document.querySelectorAll('.product-card');

    cards.forEach(card => {
        // Kartın içindeki başlığı (h3) alıyoruz
        let title = card.querySelector('h3').innerText.toLowerCase();
        
        if (title.includes(input)) {
            card.classList.remove('hidden'); // Eşleşiyorsa göster
        } else {
            card.classList.add('hidden'); // Eşleşmiyorsa gizle
        }
    });
}

    let sepet = [];
    let toplamFiyat = 0;

    function buy(ad, fiyat) {
        sepet.push({ad, fiyat});
        toplamFiyat += fiyat;
        updateCartUI();
        alert(ad + " sepete eklendi!");
    }

    function updateCartUI() {
        // Navigasyondaki sayıyı güncelle
        document.getElementById('cart-btn').innerText = "Sepetim (" + sepet.length + ")";
        
        // Modal içindeki listeyi güncelle
        let listHtml = "";
        sepet.forEach((item, index) => {
            listHtml += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; border-bottom:1px solid #eee; padding-bottom:5px;">
                            <span>${item.ad}</span>
                            <span>${item.fiyat} TL</span>
                         </div>`;
        });
        
        if(sepet.length > 0) {
            document.getElementById('cartList').innerHTML = listHtml;
        }
        document.getElementById('total-price').innerText = "Toplam: " + toplamFiyat + " TL";
    }

    function toggleCart() {
        const modal = document.getElementById('cartModal');
        const overlay = document.getElementById('overlay');
        const isVisible = modal.style.display === 'block';
        
        modal.style.display = isVisible ? 'none' : 'block';
        overlay.style.display = isVisible ? 'none' : 'block';
    }
</script>

</body>
</html>
